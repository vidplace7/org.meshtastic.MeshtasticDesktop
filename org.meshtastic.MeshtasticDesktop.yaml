id: org.meshtastic.MeshtasticDesktop
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  # OpenJDK 17 is required at build time by the Meshtastic 'ATAK' module.
  # This requirement is removed in v2.8.0 (JDK 21 only).
  - org.freedesktop.Sdk.Extension.openjdk17
  - org.freedesktop.Sdk.Extension.openjdk21
command: meshtastic-wrapper.sh

finish-args:
  - --share=ipc
  # Allow the app to communicate with the X server
  - --socket=x11
  # Required for USB Serial support
  - --device=all
  # Needs network access
  - --share=network
  # Status tray / notifications support
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  # Allow bluetooth if available
  - --allow=bluetooth
  - --system-talk-name=org.bluez.*
  # Set env for the bundled JBR
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre

modules:
  # Jetbrains Runtime (JBR) JRE must be used for proper window scaling, font rendering, etc.
  - name: jbr
    buildsystem: simple
    build-commands:
      - mkdir -p /app/jre
      - tar xzf jbr-*.tar.gz -C /app/jre --strip-components=1
    sources:
      - type: file
        url: https://cache-redirector.jetbrains.com/intellij-jbr/jbr-21.0.11-linux-x64-b1163.116.tar.gz
        sha256: 72bf2d1830587a3cd31b718d4af9fc7a88fc6c3740642d842b3b378d4acbe476
        only-arches:
          - x86_64
      - type: file
        url: https://cache-redirector.jetbrains.com/intellij-jbr/jbr-21.0.11-linux-aarch64-b1163.116.tar.gz
        sha256: 02124d01591c173f9a51ef84d99ce248900d4d1e1aa52a38c65f4708f66b6e98
        only-arches:
          - aarch64

  - name: meshtastic-desktop
    buildsystem: simple
    build-options:
      append-path: "/usr/lib/sdk/openjdk21/bin"
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk21/jvm/openjdk-21
        # Disable Gradle's auto-download and auto-detect of Java installations
        ORG_GRADLE_PROJECT_org.gradle.java.installations.auto-detect: "false"
        ORG_GRADLE_PROJECT_org.gradle.java.installations.auto-download: "false"
        ORG_GRADLE_PROJECT_org.gradle.java.installations.paths: "/usr/lib/sdk/openjdk21/jvm/openjdk-21,/usr/lib/sdk/openjdk17/jvm/openjdk-17"
    build-commands:
      - install -Dm755 meshtastic-wrapper.sh /app/bin/meshtastic-wrapper.sh
      # Install desktop metadata
      - install -Dm644 desktopApp/packaging/icons/icon_round.svg /app/share/icons/hicolor/scalable/apps/org.meshtastic.MeshtasticDesktop.svg
      - install -Dm644 desktopApp/packaging/linux/org.meshtastic.desktop.desktop /app/share/applications/org.meshtastic.MeshtasticDesktop.desktop
      - desktop-file-edit --set-key="Exec" --set-value="meshtastic-wrapper.sh %U"
        /app/share/applications/org.meshtastic.MeshtasticDesktop.desktop
      # Rename the icon from "org.meshtastic.desktop" to "org.meshtastic.MeshtasticDesktop".
      # Fixed in v2.8.0 (remove during upgrade).
      - desktop-file-edit --set-key="Icon" --set-value="org.meshtastic.MeshtasticDesktop"
        /app/share/applications/org.meshtastic.MeshtasticDesktop.desktop
      - install -Dm644 desktopApp/packaging/linux/org.meshtastic.desktop.metainfo.xml /app/share/metainfo/org.meshtastic.MeshtasticDesktop.metainfo.xml
      # Build!
      - ./gradlew --offline :desktopApp:packageUberJarForCurrentOS
      - >
        JAR_FILE=$(find desktopApp/build/compose/jars/ -name "*.jar" -type f | head -1)
        && install -Dm755 "$JAR_FILE" /app/lib/meshtastic-desktop.jar
    sources:
      - type: git
        url: https://github.com/meshtastic/Meshtastic-Android.git
        tag: v2.7.14
        commit: cf68c86af556cfd44d83064a1a03df6f63707014
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/meshtastic/Meshtastic-Android/releases/latest
          timestamp-query: .published_at
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
      - type: file
        url: https://services.gradle.org/distributions/gradle-9.5.1-all.zip
        sha256: c72fb9991f6025cbe337d52ba77e531b3faf62bdd3e348fe1ccee9f51c71adb0
        dest: "gradle/wrapper"
        dest-filename: "gradle-all.zip"
        x-checker-data:
          type: json
          url: https://services.gradle.org/versions/current
          is-main-source: false
          version-query: .version
          url-query: .downloadUrl
      - type: file
        path: gradle-wrapper.properties
        dest: "gradle/wrapper"
      - flatpak-sources.json
      - type: file
        path: meshtastic-wrapper.sh
      - type: patch
        paths:
          # Remove the toolchainVendor=JETBRAINS line in the Gradle daemon JVM properties
          # as it causes Gradle to fail when building with OpenJDK
          - patches/gradle-remove_JvmVendorSpec.patch
          # Patch the metainfo.xml file for now.
          # The file in-repo uses ID 'org.meshtastic.desktop' and is incomplete (missing screenshots).
          # Fixed in v2.8.0 (remove during upgrade).
          - patches/metainfo-rename_MeshtasticDesktop.patch
