name: Flatpak
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Flatpak (apt)
        run: |
          sudo apt update
          sudo apt install -y flatpak
      - name: Add FlatHub .flatpakrepo
        run: flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Install Flatpak Builder (FlatHub)
        run: flatpak install flathub -y org.flatpak.Builder
      - name: Lint flatpak manifest
        run: flatpak run --command=flatpak-builder-lint org.flatpak.Builder manifest org.meshtastic.MeshtasticDesktop.yaml
  build:
    needs:
      - lint
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        arch: [x86_64, aarch64]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Flatpak Builder (apt)
        run: |
          sudo apt update
          sudo apt install -y flatpak-builder
      - name: Add FlatHub .flatpakrepo
        run: flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Install Flatpak Builder (FlatHub)
        run: flatpak install flathub -y org.flatpak.Builder
      - name: Build flatpak
        run: |
          flatpak-builder --user --repo=repo --install-deps-from=flathub --force-clean builddir org.meshtastic.MeshtasticDesktop.yaml
      - name: Lint flatpak repo
        run: flatpak run --command=flatpak-builder-lint org.flatpak.Builder repo repo
        continue-on-error: true  # Linting should not be fatal.
      - name: Export .flatpak bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: >
          flatpak build-bundle repo org.meshtastic.MeshtasticDesktop.${ARCH}.flatpak org.meshtastic.MeshtasticDesktop
          --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo
      - name: Upload .flatpak
        uses: actions/upload-artifact@v7
        with:
          name: meshtastic-desktop-flatpak-${{ matrix.arch }}
          path: org.meshtastic.MeshtasticDesktop.${{ matrix.arch }}.flatpak
